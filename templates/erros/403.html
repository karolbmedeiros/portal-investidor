<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso negado — Gestora</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F7F8FA; color: #1A1A2E;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 24px;
    }
    .numero { font-size: 96px; font-weight: 800; color: #E5E7EB; line-height: 1; letter-spacing: -4px; }
    h1 { font-size: 22px; font-weight: 700; margin: 12px 0 8px; }
    p { color: #6B7280; font-size: 14px; margin-bottom: 28px; }
    a {
      display: inline-flex; align-items: center; gap: 6px;
      background: #E8621A; color: #fff;
      padding: 9px 20px; border-radius: 6px;
      font-size: 13px; font-weight: 600; text-decoration: none;
      transition: background .15s;
    }
    a:hover { background: #D4541A; }
  </style>
</head>
<body>
  <div>
    <div class="numero">403</div>
    <h1>Acesso negado</h1>
    <p>Você não tem permissão para acessar esta página.</p>
    <a href="/">← Voltar ao início</a>
  </div>
</body>
</html>
